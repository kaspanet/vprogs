[package]
edition = "2021"
name    = "kaspa-math"
version = "1.1.0-rc.3"

[dependencies]
borsh              = { version = "1.5.1", features = ["derive", "rc"] }
faster-hex         = "0.9.0"
js-sys             = "0.3.70"
kaspa-utils        = { git = "https://github.com/kaspanet/rusty-kaspa", branch = "master" }
malachite-base     = "0.4"
malachite-nz       = "0.4"
serde              = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6.1"
thiserror          = "1"
wasm-bindgen       = { version = "0.2.100", features = ["serde-serialize"] }
workflow-core      = "0.18.0"
workflow-log       = "0.18.0"
workflow-wasm      = "0.18.0"
