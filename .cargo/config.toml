[env]
# Skip RISC-0 guest compilation by default. The build scripts produce stub ELF constants so
# host-side code compiles without the RISC-0 toolchain.
#
# To build real guest ELFs, unset this and either:
#   - Install the RISC-0 toolchain: `rzup install rust`
#   - Or use Docker: set RISC0_USE_DOCKER=1 (also requires `rzup` for version detection)
RISC0_SKIP_BUILD = "1"

# Use RISC-0 dev mode by default — the prover generates fake receipts instead of real proofs.
# Unset for production builds that require valid, verifiable proofs.
RISC0_DEV_MODE = "1"
