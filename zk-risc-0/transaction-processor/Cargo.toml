[package]
edition = "2021"
name    = "vprogs-zk-risc0-transaction-processor"
version = "0.1.0"

[dependencies]
blake3                    = { version = "1", default-features = false }
risc0-zkvm                = { version = "3.0", default-features = false, features = ["std"] }
rkyv                      = { version = "0.8", default-features = false, features = ["alloc"] }
vprogs-zk-abi             = { path = "../../zk/abi", default-features = false }
vprogs-zk-risc0-guest-abi = { path = "../guest-abi", default-features = false }
