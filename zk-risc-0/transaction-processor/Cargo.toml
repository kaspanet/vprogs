[package]
edition = "2021"
name    = "vprogs-zk-risc0-transaction-processor"
version = "0.1.0"

[dependencies]
blake3                                    = { version = "1", default-features = false }
borsh                                     = { version = "1.6.0", default-features = false, features = ["derive"] }
risc0-zkvm                                = { version = "3.0", default-features = false, features = ["std"] }
vprogs-zk-risc0-transaction-processor-abi = { path = "../transaction-processor-abi", default-features = false }
vprogs-zk-types                           = { path = "../../zk/types", default-features = false }
