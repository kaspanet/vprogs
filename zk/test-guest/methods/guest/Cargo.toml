[package]
name = "vprogs-zk-test-guest"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
risc0-zkvm = { version = "^3.0.4", default-features = false, features = ["getrandom"] }
vprogs-zk-core = { path = "../../../core" }

# Always optimize; building and running the guest takes much longer without.
[profile.dev]
opt-level = 3

[profile.release]
debug = 1
lto = true
