[package]
edition.workspace = true
name              = "vprogs-zk-vm"
version.workspace = true

[features]
default = []
e2e-test = ["dep:vprogs-zk-test-methods"]

[dependencies]
borsh.workspace                       = true
log.workspace                         = true
risc0-zkvm = { version = "3.0.4", features = ["prove"] }
vprogs-core-types.workspace           = true
vprogs-scheduling-scheduler.workspace = true
vprogs-state-space.workspace          = true
vprogs-storage-types.workspace        = true
vprogs-zk-core                        = { workspace = true, features = ["std"] }
vprogs-zk-prover.workspace            = true
vprogs-zk-test-methods                = { path = "../test-guest/methods", optional = true }

[dev-dependencies]
tempfile.workspace                     = true
vprogs-scheduling-test-suite.workspace = true
vprogs-storage-rocksdb-store.workspace = true
vprogs-storage-manager.workspace       = true
