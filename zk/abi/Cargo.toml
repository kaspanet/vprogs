[package]
edition.workspace = true
name              = "vprogs-zk-abi"
version.workspace = true

[features]
default = ["std"]
host = [
  "std",
  "dep:borsh",
  "dep:kaspa-consensus-core",
  "dep:kaspa-rpc-core",
  "dep:vprogs-l1-types",
  "dep:vprogs-scheduling-scheduler",
  "dep:vprogs-storage-types",
]
std = []

[dependencies]
blake3                      = { workspace = true }
borsh                       = { workspace = true, default-features = false, optional = true }
kaspa-consensus-core        = { workspace = true, optional = true }
kaspa-hashes                = { workspace = true }
kaspa-rpc-core              = { workspace = true, optional = true }
kaspa-seq-commit            = { workspace = true }
kaspa-smt                   = { workspace = true }
thiserror                   = { workspace = true, default-features = false }
vprogs-core-codec           = { workspace = true }
vprogs-core-smt             = { workspace = true }
vprogs-core-types           = { workspace = true, default-features = false }
vprogs-l1-types             = { workspace = true, optional = true }
vprogs-l1-utils             = { workspace = true }
vprogs-scheduling-scheduler = { workspace = true, optional = true }
vprogs-storage-types        = { workspace = true, optional = true }

[dev-dependencies]
blake3          = "1"
vprogs-core-smt = { workspace = true }
