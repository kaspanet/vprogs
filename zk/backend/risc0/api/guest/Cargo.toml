[package]
edition = "2021"
name    = "vprogs-zk-backend-risc0-api-guest"
version = "0.1.0"

[features]
default = ["std"]
std     = ["vprogs-zk-abi/std"]

[dependencies]
blake3        = { version = "1", default-features = false }
borsh         = { version = "1", default-features = false }
bytemuck      = { version = "1" }
risc0-zkvm    = { version = "3.0", default-features = false }
vprogs-zk-abi = { path = "../../../../abi", default-features = false }
