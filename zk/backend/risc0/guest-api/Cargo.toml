[package]
edition = "2021"
name    = "vprogs-zk-backend-risc0-guest-api"
version = "0.1.0"

[features]
default = ["std"]
std     = ["vprogs-zk-abi/std"]

[dependencies]
risc0-zkvm    = { version = "3.0", default-features = false }
rkyv          = { version = "0.8", default-features = false }
vprogs-zk-abi = { path = "../../../abi", default-features = false }
