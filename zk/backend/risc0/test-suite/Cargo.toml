[package]
edition = "2021"
name    = "vprogs-zk-backend-risc0-test-suite"
version = "0.1.0"

[features]
cuda = ["vprogs-zk-backend-risc0-api/cuda"]

[dependencies]
kaspa-consensus-core.workspace        = true
kaspa-grpc-client.workspace           = true
kaspa-hashes.workspace                = true
kaspa-rpc-core.workspace              = true
kaspa-seq-commit.workspace            = true
tap.workspace                         = true
vprogs-core-codec.workspace           = true
vprogs-core-smt.workspace             = true
vprogs-core-types.workspace           = true
vprogs-l1-types.workspace             = true
vprogs-l1-wallet.workspace            = true
vprogs-scheduling-scheduler.workspace = true
vprogs-state-version.workspace        = true
vprogs-storage-manager.workspace      = true
vprogs-storage-types.workspace        = true
vprogs-zk-abi                         = { workspace = true, features = ["host"] }
vprogs-zk-aggregate-prover.workspace  = true
vprogs-zk-backend-risc0-api           = { path = "../api", features = ["host"] }
vprogs-zk-backend-risc0-covenant      = { path = "../covenant" }
vprogs-zk-batch-prover.workspace      = true
zerocopy.workspace                    = true

[dev-dependencies]
kaspa-txscript.workspace               = true
tempfile.workspace                     = true
tokio                                  = { workspace = true, features = ["rt-multi-thread"] }
vprogs-core-hashing.workspace          = true
vprogs-core-test-utils.workspace       = true
vprogs-node-test-utils.workspace       = true
vprogs-storage-rocksdb-store.workspace = true
vprogs-zk-transaction-prover           = { path = "../../../transaction-prover" }
vprogs-zk-vm                           = { path = "../../../vm" }
